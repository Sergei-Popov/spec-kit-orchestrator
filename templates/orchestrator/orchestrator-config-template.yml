# Spec Kit Orchestrator Configuration
# Generated by: specify init --orchestrate
# Docs: https://github.com/github/spec-kit/docs/orchestration.md

# Active feature (auto-detected from git branch or SPECIFY_FEATURE env var)
feature: ""

# Autonomy mode: supervised | semi-auto | autonomous
#   supervised  — human approves every work package before proceeding
#   semi-auto   — human approves each phase, agents execute within phase
#   autonomous  — full auto, pauses only on CRITICAL findings or test failures
mode: semi-auto

# Agent team configuration
agents:
  architect:
    role: architect
    count: 1
    capabilities:
      - architecture_review
      - data_model_validation
      - refactoring_plans
      - tech_debt_assessment

  code:
    role: code
    count: 1
    capabilities:
      - implementation
      - bug_fixes
      - file_operations
    parallel: true

  test:
    role: test
    count: 1
    capabilities:
      - test_generation
      - test_execution
      - coverage_analysis

  review:
    role: review
    count: 1
    capabilities:
      - code_review
      - spec_compliance
      - quality_gates
      - security_audit

# Checkpoint settings
checkpoints:
  after_phase: true
  after_work_package: false
  before_merge: true

# Provider execution capabilities (source of truth for orchestration artifacts)
provider_capabilities:
  subagent_types:
    - name: general
      description: Full tool access — reads, writes, runs commands, calls APIs
    - name: explore
      description: Read-only codebase research
  task_tool: Task
  task_id_field: task_id
  registered_slash_commands: []

# Quality gate thresholds
quality_gates:
  min_test_coverage: 80
  require_review_approval: true
  max_review_rounds: 3
  lint_must_pass: true
